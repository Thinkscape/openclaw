name: Thinkscape Upstream Release Sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: Upstream release tag to sync, for example v2026.3.31. Leave blank to use the latest upstream release.
        required: false
        type: string
      dry_run:
        description: Prepare and validate the patched release branch without pushing or dispatching Docker Release.
        required: false
        default: false
        type: boolean

concurrency:
  group: thinkscape-upstream-release-sync
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  sync-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout fork default branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node environment
        shell: bash
        run: |
          set -euo pipefail
          node_version="$(curl -fsSL https://nodejs.org/dist/index.json | jq -r '[.[] | select(.version | startswith("v24."))][0].version')"
          node_dir="${RUNNER_TEMP}/node-${node_version}-linux-x64"
          curl -fsSL "https://nodejs.org/dist/${node_version}/node-${node_version}-linux-x64.tar.xz" -o "${RUNNER_TEMP}/node.tar.xz"
          mkdir -p "${node_dir}"
          tar -xJf "${RUNNER_TEMP}/node.tar.xz" -C "${node_dir}" --strip-components=1
          echo "${node_dir}/bin" >> "$GITHUB_PATH"
          export PATH="${node_dir}/bin:$PATH"
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          node -v
          pnpm -v

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream release into Thinkscape fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOME: ${{ runner.temp }}/openclaw-release-sync-home
          OPENCLAW_STATE_DIR: ${{ runner.temp }}/openclaw-release-sync-home/.openclaw
          RELEASE_TAG: ${{ inputs.tag }}
          SYNC_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          COPILOT_ASSIGNMENT_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN }}
          PATCH_SERIES_FILE: thinkscape/patches/series
        run: |
          mkdir -p "$HOME/.openclaw"
          bash scripts/thinkscape-upstream-release-sync.sh
