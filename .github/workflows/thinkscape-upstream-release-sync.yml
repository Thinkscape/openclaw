name: Thinkscape Upstream Release Sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: Upstream release tag to sync, for example v2026.3.31. Leave blank to use the latest upstream release.
        required: false
        type: string
      dry_run:
        description: Prepare and validate the patched release branch without pushing or dispatching Docker Release.
        required: false
        default: false
        type: boolean

concurrency:
  group: thinkscape-upstream-release-sync
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  sync-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout fork default branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream release into Thinkscape fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          SYNC_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          COPILOT_ASSIGNMENT_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN }}
          PATCH_REF_SUBAGENT: thinkscape-patch-subagent-gateway-timeout
          PATCH_REF_SESSION_LOCK: thinkscape-patch-session-write-lock
          PATCH_REF_SANDBOX_NO_NEW_PRIVILEGES: thinkscape-patch-sandbox-no-new-privileges
        run: bash scripts/thinkscape-upstream-release-sync.sh
